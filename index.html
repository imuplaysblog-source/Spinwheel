<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel - Choose Your Fate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Spin the Wheel 🎯</h1>
        <p>Choose your fate!</p>
        
        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <div class="segment">God</div>
                <div class="segment">Demon</div>
                <div class="segment">Human</div>
                <div class="segment">Elfs</div>
                <div class="segment">Vikings</div>
            </div>
            <div class="arrow"></div>
        </div>
        
        <button id="spinBtn" onclick="spinWheel()">SPIN NOW</button>
        <p id="result"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
