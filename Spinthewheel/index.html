<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Spin & Win! 🎉</h1>
        <p>Spin only once!</p>
        
        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <div class="segment">Prize 1</div>
                <div class="segment">Prize 2</div>
                <div class="segment">Prize 3</div>
                <div class="segment">Prize 4</div>
                <div class="segment">Prize 5</div>
                <div class="segment">Prize 6</div>
            </div>
            <div class="arrow"></div>
        </div>
        
        <button id="spinBtn" onclick="spinWheel()">SPIN NOW</button>
        <p id="result"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
